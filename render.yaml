# Render Blueprint - Free Tier Deployment
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: api-stress-lab-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_SPECS
        value: specs
      - key: S3_BUCKET_ARTIFACTS
        value: artifacts
      - key: S3_BUCKET_REPORTS
        value: reports
      - key: OPENAI_API_KEY
        sync: false

